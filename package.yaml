name:                KamiBlue
version:             0.0.1.0
github:              "githubuser/KamiBlue"
license:             BSD-3-Clause
author:              "Alberto Genuardy"
maintainer:          "albertozaaz760@gmail.com"
copyright:           "2026 Alberto Genuardy"

extra-source-files:
- README.md
- CHANGELOG.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/githubuser/KamiBlue#readme>

dependencies:
- base >= 4.7 && < 5
- servant
- servant-server
- warp
- aeson
- text
- bytestring
- time
- http-conduit         
- directory  
- filepath
- process
- websockets
- stm
- servant-websockets
- wai

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  KamiBlue-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - KamiBlue

tests:
  KamiBlue-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - KamiBlue
